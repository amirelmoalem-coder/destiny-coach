<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מצפן הגורל — המדריך האישי שלך</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Heebo:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --deep: #0A0A14;
    --deep2: #10101E;
    --deep3: #181828;
    --text: #E8E0D0;
    --text-dim: #9990AA;
    --accent: #7B5EA7;
    --accent2: #4A90D9;
    --star: rgba(255,255,255,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Stars background */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.3); }
  }

  /* Nebula */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(123,94,167,0.15) 0%, transparent 70%);
    top: -200px; right: -200px;
    animation: drift 20s infinite ease-in-out alternate;
  }
  .nebula-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(74,144,217,0.12) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    animation: drift 25s infinite ease-in-out alternate-reverse;
  }
  @keyframes drift {
    0% { transform: translate(0,0); }
    100% { transform: translate(30px, 30px); }
  }

  /* Main container */
  #app {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeInDown 1s ease;
  }
  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 5vw, 36px);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), #8B6914);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .tagline {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  /* Card */
  .card {
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 36px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeInUp 0.6s ease;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 10px;
    transition: width 0.6s ease;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* Step icon */
  .step-icon {
    font-size: 48px;
    text-align: center;
    margin-bottom: 20px;
    animation: pulse 3s infinite ease-in-out;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.05); filter: brightness(1.2); }
  }

  /* Question */
  .question-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3.5vw, 26px);
    color: var(--text);
    text-align: center;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .question-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 30px;
    font-style: italic;
  }

  /* Input */
  .input-group {
    margin-bottom: 20px;
  }
  .input-label {
    display: block;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
    direction: rtl;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.07);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }
  textarea { resize: none; min-height: 100px; }
  select option { background: var(--deep2); }

  /* Choice buttons */
  .choices {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }
  .choices.two-col { grid-template-columns: 1fr 1fr; }
  .choice-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: right;
    direction: rtl;
    line-height: 1.4;
  }
  .choice-btn:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    transform: translateX(-3px);
  }
  .choice-btn.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.15);
    box-shadow: 0 0 15px rgba(201,168,76,0.2);
  }
  .choice-btn .emoji { margin-left: 8px; font-size: 20px; }

  /* Button */
  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #8B6914, var(--gold), #C9A84C);
    border: none;
    border-radius: 12px;
    color: #0A0A14;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
  }
  .btn:hover::after { left: 100%; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.35); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
  }
  .orbit {
    width: 80px; height: 80px;
    margin: 0 auto 24px;
    position: relative;
  }
  .orbit-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid transparent;
  }
  .orbit-ring-1 {
    width: 80px; height: 80px;
    top: 0; left: 0;
    border-top-color: var(--gold);
    animation: spin 1.5s linear infinite;
  }
  .orbit-ring-2 {
    width: 55px; height: 55px;
    top: 12px; left: 12px;
    border-right-color: var(--accent);
    animation: spin 1s linear infinite reverse;
  }
  .orbit-core {
    position: absolute;
    width: 20px; height: 20px;
    background: radial-gradient(circle, var(--gold-light), var(--gold));
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px var(--gold);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .loading-quote {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
    margin-top: 16px;
    opacity: 0;
    animation: fadeIn 1s ease 0.5s forwards;
  }

  /* Result */
  .result-header {
    text-align: center;
    margin-bottom: 30px;
  }
  .result-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(16px, 3vw, 22px);
    color: var(--gold);
    margin-bottom: 8px;
  }
  .section {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-content {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
  }
  .section-content p { margin-bottom: 10px; }
  .section-content p:last-child { margin-bottom: 0; }
  .highlight {
    color: var(--gold-light);
    font-weight: 500;
  }

  /* Action steps */
  .steps-list {
    list-style: none;
    counter-reset: step;
  }
  .steps-list li {
    counter-increment: step;
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    align-items: flex-start;
  }
  .steps-list li::before {
    content: counter(step);
    min-width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  /* Chat */
  .chat-wrap {
    margin-top: 30px;
  }
  .chat-messages {
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--gold) transparent;
  }
  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeInUp 0.3s ease;
  }
  .msg-ai {
    background: rgba(123,94,167,0.2);
    border: 1px solid rgba(123,94,167,0.3);
    align-self: flex-start;
    border-radius: 14px 14px 14px 4px;
  }
  .msg-user {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.25);
    align-self: flex-end;
    border-radius: 14px 14px 4px 14px;
    text-align: right;
  }
  .chat-input-row {
    display: flex;
    gap: 10px;
  }
  .chat-input-row input {
    flex: 1;
    margin: 0;
  }
  .send-btn {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08); }

  /* Animations */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 500px) {
    .card { padding: 24px 18px; }
    .choices.two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<div id="app">
  <div class="header">
    <div class="logo">✦ מצפן הגורל ✦</div>
    <div class="tagline">גלה את ייעודך האמיתי</div>
    <div class="divider"></div>
  </div>
  <div id="main-card" class="card"></div>
</div>

<script>
// ---- Stars ----
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --dur:${2+Math.random()*4}s;
    animation-delay:${Math.random()*5}s;
  `;
  starsEl.appendChild(s);
}

// ---- State ----
const state = {
  step: 0,
  answers: {},
  profile: null,
  chatHistory: []
};

// ---- Steps definition ----
const steps = [
  {
    id: 'name',
    icon: '✨',
    title: 'ברוך הבא למסע הגילוי שלך',
    subtitle: 'אני אהיה המדריך שלך — שילוב של אסטרולוגיה, נומרולוגיה וקואצ\'ינג',
    fields: [{ type: 'text', key: 'name', label: 'מה שמך המלא?', placeholder: 'שמך המלא...' }]
  },
  {
    id: 'birthdate',
    icon: '🌙',
    title: 'תאריך הלידה שלך — שפת הכוכבים',
    subtitle: 'הכוכבים שמרו את הסוד שלך מהרגע הראשון',
    fields: [
      { type: 'date', key: 'birthdate', label: 'תאריך לידה' },
      { type: 'time', key: 'birthtime', label: 'שעת לידה (אם ידוע)', placeholder: 'HH:MM' }
    ]
  },
  {
    id: 'birthplace',
    icon: '🌍',
    title: 'מקום הלידה שלך',
    subtitle: 'המיקום בשמיים בזמן לידתך מגדיר את האנרגיות שלך',
    fields: [{ type: 'text', key: 'birthplace', label: 'עיר ומדינה', placeholder: 'לדוגמה: תל אביב, ישראל' }]
  },
  {
    id: 'feeling',
    icon: '💫',
    title: 'מה אתה מרגיש עכשיו בחיים?',
    subtitle: 'דבר אליי בכנות — אין תשובה נכונה או שגויה',
    type: 'choices',
    choices: [
      { emoji: '🌪️', text: 'אבוד, לא יודע לאן ללכת' },
      { emoji: '🔥', text: 'יש בי אנרגיה אבל חסר כיוון' },
      { emoji: '😴', text: 'עייף ומחפש משמעות' },
      { emoji: '🚀', text: 'מוכן לשינוי גדול' },
      { emoji: '⚡', text: 'תקוע, רוצה להתפרץ' },
      { emoji: '🌱', text: 'בתחילת מסע חדש' }
    ],
    key: 'feeling'
  },
  {
    id: 'passion',
    icon: '❤️‍🔥',
    title: 'מה גורם לך לשכוח את הזמן?',
    subtitle: 'כשאתה שקוע בזה — שעות עוברות כמו דקות',
    fields: [{ type: 'textarea', key: 'passion', label: 'תאר בחופשיות', placeholder: 'כתוב מה שעולה לך...' }]
  },
  {
    id: 'strength',
    icon: '⚡',
    title: 'מה אנשים אומרים שאתה טוב בו?',
    subtitle: 'לפעמים אחרים רואים את כוחותינו לפנינו',
    fields: [{ type: 'textarea', key: 'strength', label: 'הכישורים שלך', placeholder: 'גם אם זה נשמע פשוט...' }]
  },
  {
    id: 'obstacle',
    icon: '🌑',
    title: 'מה עוצר אותך?',
    subtitle: 'הצל שמחכה לאור',
    type: 'choices',
    choices: [
      { emoji: '😨', text: 'פחד מכישלון' },
      { emoji: '🤷', text: 'לא יודע מאיפה להתחיל' },
      { emoji: '💸', text: 'חוסר משאבים' },
      { emoji: '👥', text: 'דעות של אחרים' },
      { emoji: '🧠', text: 'ביקורת עצמית' },
      { emoji: '⏰', text: 'חוסר זמן' }
    ],
    key: 'obstacle'
  },
  {
    id: 'dream',
    icon: '🌟',
    title: 'אם הכל היה אפשרי — מה היית עושה?',
    subtitle: 'שחרר את הצנזור הפנימי. תן לחלום לדבר.',
    fields: [{ type: 'textarea', key: 'dream', label: 'החלום הגדול שלך', placeholder: 'כתוב מבלי לשפוט את עצמך...' }]
  }
];

// ---- Render ----
function render() {
  const card = document.getElementById('main-card');
  card.innerHTML = '';

  if (state.step < steps.length) {
    renderStep(card, steps[state.step]);
  } else if (state.step === steps.length) {
    renderLoading(card);
    generateProfile();
  } else {
    renderResult(card);
  }
}

function renderProgress(container) {
  const pct = Math.round((state.step / steps.length) * 100);
  const wrap = document.createElement('div');
  wrap.className = 'progress-wrap';
  wrap.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-text">${state.step}/${steps.length}</div>
  `;
  container.appendChild(wrap);
}

function renderStep(card, step) {
  renderProgress(card);

  const icon = document.createElement('div');
  icon.className = 'step-icon';
  icon.textContent = step.icon;
  card.appendChild(icon);

  const title = document.createElement('div');
  title.className = 'question-title';
  title.textContent = step.title;
  card.appendChild(title);

  const sub = document.createElement('div');
  sub.className = 'question-subtitle';
  sub.textContent = step.subtitle;
  card.appendChild(sub);

  if (step.type === 'choices') {
    const grid = document.createElement('div');
    grid.className = 'choices two-col';
    let selected = state.answers[step.key] || null;

    step.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (selected === c.text ? ' selected' : '');
      btn.innerHTML = `<span class="emoji">${c.emoji}</span>${c.text}`;
      btn.onclick = () => {
        selected = c.text;
        state.answers[step.key] = c.text;
        grid.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      grid.appendChild(btn);
    });
    card.appendChild(grid);
  } else {
    step.fields.forEach(f => {
      const group = document.createElement('div');
      group.className = 'input-group';
      const label = document.createElement('label');
      label.className = 'input-label';
      label.textContent = f.label;
      group.appendChild(label);

      let el;
      if (f.type === 'textarea') {
        el = document.createElement('textarea');
        el.placeholder = f.placeholder || '';
      } else {
        el = document.createElement('input');
        el.type = f.type;
        if (f.placeholder) el.placeholder = f.placeholder;
      }
      el.value = state.answers[f.key] || '';
      el.addEventListener('input', () => { state.answers[f.key] = el.value; });
      group.appendChild(el);
      card.appendChild(group);
    });
  }

  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = state.step === steps.length - 1 ? '✨ גלה את הייעוד שלי' : 'המשך ←';
  btn.onclick = () => {
    state.step++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  card.appendChild(btn);
}

function renderLoading(card) {
  const quotes = [
    '"כל אחד בא לעולם עם שליחות" — הקבלה',
    '"הכוכבים נוטים, לא כופים" — ח\'ובן',
    '"מה שנמצא בפנים, יתגלה בחוץ" — חכמת הנומרולוגיה'
  ];
  card.innerHTML = `
    <div class="loading">
      <div class="orbit">
        <div class="orbit-ring orbit-ring-1"></div>
        <div class="orbit-ring orbit-ring-2"></div>
        <div class="orbit-core"></div>
      </div>
      <div class="loading-text">מנתח את מפת הגורל שלך...</div>
      <div class="loading-quote">${quotes[Math.floor(Math.random()*quotes.length)]}</div>
    </div>
  `;
}

function renderResult(card) {
  card.innerHTML = '';
  renderProgress(card);

  const p = state.profile;

  // Header
  const header = document.createElement('div');
  header.className = 'result-header';
  header.innerHTML = `
    <div style="font-size:56px;margin-bottom:12px">🌟</div>
    <div class="result-name">${state.answers.name} — מפת הגורל שלך</div>
    <div style="color:var(--text-dim);font-size:13px">ניתוח אישי מלא</div>
  `;
  card.appendChild(header);

  // Render sections from profile
  if (p) {
    p.sections.forEach(sec => {
      const s = document.createElement('div');
      s.className = 'section';
      s.innerHTML = `
        <div class="section-title">${sec.icon} ${sec.title}</div>
        <div class="section-content">${sec.content}</div>
      `;
      card.appendChild(s);
    });

    // Action steps
    if (p.steps && p.steps.length) {
      const stepsEl = document.createElement('div');
      stepsEl.className = 'section';
      stepsEl.innerHTML = `<div class="section-title">🗺️ המסלול שלך — צעדים ראשונים</div>`;
      const ul = document.createElement('ul');
      ul.className = 'steps-list';
      p.steps.forEach(st => {
        const li = document.createElement('li');
        li.textContent = st;
        ul.appendChild(li);
      });
      stepsEl.appendChild(ul);
      card.appendChild(stepsEl);
    }
  }

  // Chat
  const chatWrap = document.createElement('div');
  chatWrap.className = 'chat-wrap section';
  chatWrap.innerHTML = `
    <div class="section-title">💬 שאל את המדריך שלך</div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="שאל שאלה על הייעוד שלך..." />
      <button class="send-btn" id="send-btn">→</button>
    </div>
  `;
  card.appendChild(chatWrap);

  // Init chat
  setTimeout(() => {
    addMsg('ai', `שלום ${state.answers.name}! עיינתי במפת הגורל שלך. יש לך שאלות? אני כאן לעזור. 🌟`);
    document.getElementById('send-btn').onclick = sendChat;
    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendChat();
    });
  }, 100);
}

function addMsg(role, text) {
  const msgs = document.getElementById('chat-msgs');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (role === 'user') state.chatHistory.push({ role: 'user', content: text });
  else state.chatHistory.push({ role: 'assistant', content: text });
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);

  const thinkDiv = document.createElement('div');
  thinkDiv.className = 'msg msg-ai';
  thinkDiv.textContent = '...';
  document.getElementById('chat-msgs').appendChild(thinkDiv);

  try {
    const systemPrompt = `אתה מדריך אישי מומחה בנומרולוגיה, אסטרולוגיה וקואצ'ינג טרנספורמטיבי.
פרופיל המשתמש:
- שם: ${state.answers.name}
- תאריך לידה: ${state.answers.birthdate}
- מקום לידה: ${state.answers.birthplace}
- תחושה נוכחית: ${state.answers.feeling}
- תשוקה: ${state.answers.passion}
- כוחות: ${state.answers.strength}
- חסם עיקרי: ${state.answers.obstacle}
- חלום: ${state.answers.dream}
ענה בעברית בצורה חמה, עמוקה ומדויקת. התייחס לנומרולוגיה ואסטרולוגיה כשרלוונטי. תן תשובות ממוקדות ומועילות.`;

    const msgs = [...state.chatHistory.slice(0, -1)];
    msgs.push({ role: 'user', content: text });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: msgs
      })
    });
    const data = await res.json();
    const reply = data.content?.map(c => c.text || '').join('') || 'מצטער, לא הצלחתי לענות.';
    thinkDiv.textContent = reply;
    state.chatHistory.push({ role: 'assistant', content: reply });
    document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
  } catch (e) {
    thinkDiv.textContent = 'שגיאה בחיבור. נסה שוב.';
  }
}

// ---- Generate Profile ----
async function generateProfile() {
  const a = state.answers;
  const systemPrompt = `אתה מדריך רוחני-מקצועי ומומחה בנומרולוגיה, אסטרולוגיה וקואצ'ינג טרנספורמטיבי.
חשב את מספר הגורל ומספר הנשמה על פי הנומרולוגיה, הגדר את המזל ועיין בו לפי תאריך הלידה.
ענה רק ב-JSON תקני ללא Markdown, ללא backticks. פורמט:
{
  "sections": [
    {"icon":"🔢","title":"נומרולוגיה — מספרי הגורל שלך","content":"<p>...</p>"},
    {"icon":"⭐","title":"אסטרולוגיה — מפת הכוכבים שלך","content":"<p>...</p>"},
    {"icon":"💎","title":"הכוחות הנסתרים שלך","content":"<p>...</p>"},
    {"icon":"🎯","title":"הייעוד שלך","content":"<p>...</p>"},
    {"icon":"🌑","title":"הצל שלך — מה עוצר אותך","content":"<p>...</p>"}
  ],
  "steps": ["צעד ראשון...", "צעד שני...", "צעד שלישי...", "צעד רביעי...","צעד חמישי..."]
}`;

  const userMsg = `
שם: ${a.name}
תאריך לידה: ${a.birthdate}
שעת לידה: ${a.birthtime || 'לא ידוע'}
מקום לידה: ${a.birthplace || 'לא ידוע'}
תחושה: ${a.feeling}
תשוקה: ${a.passion}
כוחות: ${a.strength}
חסם: ${a.obstacle}
חלום: ${a.dream}

נתח לעומק עם חישובי נומרולוגיה ואסטרולוגיה אמיתיים. השתמש ב-<p> tags. כלול את מספר הגורל, מספר הנשמה, מזל, נרטיב עמוק ואישי.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    const data = await res.json();
    const raw = data.content?.map(c => c.text || '').join('') || '{}';
    const clean = raw.replace(/```json|```/g, '').trim();
    state.profile = JSON.parse(clean);
  } catch (e) {
    state.profile = {
      sections: [{
        icon: '✨',
        title: 'ניתוח אישי',
        content: '<p>לא הצלחתי לטעון את הניתוח. נסה שוב.</p>'
      }],
      steps: []
    };
  }

  state.step = steps.length + 1;
  render();
}

// ---- Init ----
render();
</script>
