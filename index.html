<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מצפן הגורל — ניתוח אישיות וייעוד</title>
<meta name="description" content="גלה את ייעודך האמיתי עם ניתוח נומרולוגיה, אסטרולוגיה וקואצ'ינג מבוסס בינה מלאכותית">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Heebo:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F0D080;
  --gold-dark: #8B6914;
  --deep: #070710;
  --deep2: #0D0D1A;
  --deep3: #141422;
  --text: #EDE8DC;
  --text-dim: #8880A0;
  --accent: #6B4FA0;
  --accent2: #3A7DC8;
  --rose: #C04878;
  --teal: #2A9080;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--deep);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ CANVAS BG ═══ */
#cosmos { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* ═══ APP ═══ */
#app {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 30px 18px 100px;
  min-height: 100vh;
}

/* ═══ HEADER ═══ */
.header {
  text-align: center;
  margin-bottom: 44px;
  animation: fadeDown 1.2s ease;
}
.logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(20px, 5vw, 34px);
  background: linear-gradient(135deg, #F0D080 0%, #C9A84C 40%, #8B6914 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.tagline {
  color: var(--text-dim);
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.header-line {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}

/* ═══ CARD ═══ */
.card {
  background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 24px;
  padding: 38px 32px;
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  animation: fadeUp 0.5s ease;
}

/* ═══ PROGRESS ═══ */
.prog-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 34px;
}
.prog-bar {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 10px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.prog-num {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ═══ STEP ═══ */
.step-icon {
  font-size: 52px;
  text-align: center;
  margin-bottom: 18px;
  animation: breathe 4s infinite ease-in-out;
}
.step-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(17px, 3.5vw, 24px);
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.4;
}
.step-sub {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 28px;
  font-style: italic;
  line-height: 1.6;
}

/* ═══ INPUTS ═══ */
.field { margin-bottom: 18px; }
.field-label {
  display: block;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
input[type=text], input[type=date], input[type=time], textarea, select {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
  direction: rtl;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,0.06);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}
textarea { resize: none; min-height: 90px; line-height: 1.6; }
select option { background: var(--deep2); }

/* ═══ CHOICE GRID ═══ */
.choices-grid {
  display: grid;
  gap: 10px;
  margin-bottom: 22px;
}
.choices-grid.cols2 { grid-template-columns: 1fr 1fr; }
.choices-grid.cols1 { grid-template-columns: 1fr; }

.choice {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 13px 16px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: right;
  direction: rtl;
  line-height: 1.5;
  position: relative;
  overflow: hidden;
}
.choice::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.1), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.choice:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-1px); }
.choice:hover::before { opacity: 1; }
.choice.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.12);
  box-shadow: 0 0 20px rgba(201,168,76,0.15);
}
.choice.selected::before { opacity: 1; }
.choice .c-emoji { font-size: 18px; margin-left: 10px; }
.choice .c-check {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2px solid rgba(201,168,76,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  transition: all 0.2s;
}
.choice.selected .c-check {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
}
.multi-hint {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 14px;
  letter-spacing: 1px;
}

/* ═══ SCALE ═══ */
.scale-wrap { margin-bottom: 22px; }
.scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
.scale-btns { display: flex; gap: 8px; }
.scale-btn {
  flex: 1;
  height: 42px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: var(--text-dim);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.scale-btn:hover, .scale-btn.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.12);
  color: var(--gold);
}

/* ═══ BTN ═══ */
.btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), #D4B060);
  border: none;
  border-radius: 14px;
  color: #0A0A14;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: left 0.6s;
}
.btn:hover::after { left: 100%; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(201,168,76,0.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ═══ LOADING ═══ */
.loading { text-align: center; padding: 50px 20px; }
.mandala {
  width: 100px; height: 100px;
  margin: 0 auto 28px;
  position: relative;
}
.m-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid transparent;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.m-ring-1 { width: 100px; height: 100px; border-top-color: var(--gold); animation: spin 2s linear infinite; }
.m-ring-2 { width: 72px; height: 72px; border-right-color: var(--accent); animation: spin 1.5s linear infinite reverse; }
.m-ring-3 { width: 48px; height: 48px; border-bottom-color: var(--teal); animation: spin 1s linear infinite; }
.m-core {
  position: absolute;
  width: 20px; height: 20px;
  background: radial-gradient(circle, var(--gold-light), var(--gold));
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 20px var(--gold);
  animation: pulse2 2s infinite ease-in-out;
}
.load-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); margin-bottom: 12px; }
.load-sub { color: var(--text-dim); font-size: 13px; letter-spacing: 2px; margin-bottom: 20px; }
.load-quote {
  font-style: italic;
  font-size: 14px;
  color: var(--text-dim);
  max-width: 320px;
  margin: 0 auto;
  line-height: 1.7;
  opacity: 0;
  animation: fadeIn 1s ease 0.8s forwards;
}
.load-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 24px; }
.load-step {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-dim);
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}
.load-step .dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  flex-shrink: 0;
}

/* ═══ RESULT ═══ */
.result-hero {
  text-align: center;
  margin-bottom: 32px;
  padding: 28px;
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(107,79,160,0.08));
  border-radius: 20px;
  border: 1px solid rgba(201,168,76,0.15);
}
.result-star { font-size: 60px; margin-bottom: 14px; animation: breathe 4s infinite; }
.result-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(14px, 3vw, 20px);
  color: var(--gold);
  margin-bottom: 6px;
}
.result-tagline { font-size: 13px; color: var(--text-dim); font-style: italic; }

.section {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(201,168,76,0.1);
  border-radius: 16px;
  padding: 22px 24px;
  margin-bottom: 14px;
  transition: all 0.3s;
}
.section:hover { border-color: rgba(201,168,76,0.2); background: rgba(255,255,255,0.035); }
.sec-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  cursor: pointer;
}
.sec-icon { font-size: 20px; }
.sec-title {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 600;
  flex: 1;
}
.sec-toggle { color: var(--text-dim); font-size: 12px; transition: transform 0.3s; }
.sec-toggle.open { transform: rotate(180deg); }
.sec-body { font-size: 14px; line-height: 1.9; color: var(--text); }
.sec-body p { margin-bottom: 10px; }
.sec-body p:last-child { margin-bottom: 0; }
.sec-body strong { color: var(--gold-light); font-weight: 600; }

.num-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--accent), var(--gold-dark));
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  margin: 0 4px;
}

/* Steps list */
.steps-ol { list-style: none; counter-reset: s; }
.steps-ol li {
  counter-increment: s;
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
  align-items: flex-start;
  font-size: 14px;
  line-height: 1.7;
}
.steps-ol li::before {
  content: counter(s);
  min-width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--accent), var(--gold-dark));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Daily affirmation */
.affirmation {
  background: linear-gradient(135deg, rgba(107,79,160,0.15), rgba(201,168,76,0.1));
  border: 1px solid rgba(107,79,160,0.25);
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 14px;
  text-align: center;
}
.aff-label { font-size: 10px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; margin-bottom: 12px; }
.aff-text { font-family: 'Playfair Display', serif; font-size: 16px; line-height: 1.7; color: var(--text); font-style: italic; }

/* Chat */
.chat-section {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(201,168,76,0.1);
  border-radius: 16px;
  padding: 22px;
  margin-top: 14px;
}
.chat-header { font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.chat-msgs {
  max-height: 320px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 14px;
  padding: 4px;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,168,76,0.3) transparent;
}
.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
  animation: fadeUp 0.3s ease;
}
.msg-ai {
  background: rgba(107,79,160,0.18);
  border: 1px solid rgba(107,79,160,0.25);
  align-self: flex-start;
  border-radius: 16px 16px 16px 4px;
}
.msg-user {
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.2);
  align-self: flex-end;
  border-radius: 16px 16px 4px 16px;
}
.chat-row { display: flex; gap: 10px; }
.chat-row input { flex: 1; margin: 0; }
.send-btn {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--accent), var(--gold-dark));
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  color: white;
  transition: all 0.3s;
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 15px rgba(107,79,160,0.4); }

/* Quick questions */
.quick-qs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.quick-q {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}
.quick-q:hover { border-color: var(--gold); color: var(--gold); }

/* Animations */
@keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
@keyframes breathe { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
@keyframes pulse2 { 0%,100% { box-shadow:0 0 20px var(--gold); } 50% { box-shadow:0 0 35px var(--gold-light); } }

@media (max-width: 480px) {
  .card { padding: 24px 16px; }
  .choices-grid.cols2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<canvas id="cosmos"></canvas>

<div id="app">
  <div class="header">
    <div class="logo">✦ מצפן הגורל ✦</div>
    <div class="tagline">ניתוח אישיות וייעוד • נומרולוגיה • אסטרולוגיה • קואצ'ינג</div>
    <div class="header-line"></div>
  </div>
  <div id="card" class="card"></div>
</div>

<script>
// ══════════════════════════════════
// COSMOS BACKGROUND
// ══════════════════════════════════
const canvas = document.getElementById('cosmos');
const ctx = canvas.getContext('2d');
let stars = [], comets = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.5 + 0.3,
    a: Math.random(),
    speed: 0.003 + Math.random() * 0.005,
    phase: Math.random() * Math.PI * 2
  });
}

function drawCosmos(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Nebulae
  const grd1 = ctx.createRadialGradient(canvas.width*0.8, canvas.height*0.2, 0, canvas.width*0.8, canvas.height*0.2, canvas.width*0.4);
  grd1.addColorStop(0, 'rgba(107,79,160,0.08)');
  grd1.addColorStop(1, 'transparent');
  ctx.fillStyle = grd1;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  const grd2 = ctx.createRadialGradient(canvas.width*0.2, canvas.height*0.7, 0, canvas.width*0.2, canvas.height*0.7, canvas.width*0.35);
  grd2.addColorStop(0, 'rgba(42,144,128,0.06)');
  grd2.addColorStop(1, 'transparent');
  ctx.fillStyle = grd2;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars
  stars.forEach(s => {
    const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });
}

let raf;
function animCosmos(t) {
  drawCosmos(t/1000);
  raf = requestAnimationFrame(animCosmos);
}
requestAnimationFrame(animCosmos);

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
const state = {
  step: 0,
  answers: {},
  profile: null,
  chatHistory: [],
  sessionInsights: [],
  userPatterns: {}
};

// ══════════════════════════════════
// GEMINI API
// ══════════════════════════════════
const OR_KEY = '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';

async function callGemini(prompt, systemContext = '') {
  const messages = [];
  if (systemContext) messages.push({ role: 'system', content: systemContext });
  messages.push({ role: 'user', content: prompt });
  
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${OR_KEY}`,
      'HTTP-Referer': 'https://matzpen-hagoral.netlify.app',
      'X-Title': 'מצפן הגורל'
    },
    body: JSON.stringify({
      model: 'google/gemini-flash-1.5',
      messages: messages,
      temperature: 0.85,
      max_tokens: 2048
    })
  });
  
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices?.[0]?.message?.content || '';
}

// ══════════════════════════════════
// STEPS
// ══════════════════════════════════
const steps = [
  {
    id: 'intro',
    icon: '🌌',
    title: 'ברוך הבא למסע הגילוי שלך',
    sub: 'מצפן הגורל ישלב נומרולוגיה, אסטרולוגיה וקואצ\'ינג כדי לחשוף את הייעוד האמיתי שלך',
    fields: [{ type: 'text', key: 'name', label: 'שמך המלא', ph: 'הכנס את שמך המלא...' }]
  },
  {
    id: 'birth',
    icon: '🌙',
    title: 'שפת הכוכבים שלך',
    sub: 'תאריך ושעת הלידה יגלו את המפה האסטרולוגית שלך',
    fields: [
      { type: 'date', key: 'birthdate', label: 'תאריך לידה' },
      { type: 'time', key: 'birthtime', label: 'שעת לידה (אם ידועה)' },
      { type: 'text', key: 'birthplace', label: 'עיר לידה', ph: 'לדוגמה: תל אביב, ישראל' }
    ]
  },
  {
    id: 'feeling',
    icon: '💫',

// ══════════════════════════════════
// NUMEROLOGY CALCULATOR
// ══════════════════════════════════
function calcLifePath(dateStr) {
  if (!dateStr) return null;
  const digits = dateStr.replace(/-/g, '').split('').map(Number);
  let sum = digits.reduce((a,b) => a+b, 0);
  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    sum = sum.toString().split('').map(Number).reduce((a,b) => a+b, 0);
  }
  return sum;
}

function calcSoulNumber(name) {
  if (!name) return null;
  const vowels = {'א':1,'ע':5,'י':1,'ו':6,'ה':5};
  let sum = name.split('').filter(c => vowels[c]).reduce((a,c) => a+vowels[c], 0);
  while (sum > 9 && sum !== 11 && sum !== 22) {
    sum = sum.toString().split('').map(Number).reduce((a,b) => a+b, 0);
  }
  return sum || Math.ceil(name.length / 3);
}

function getZodiac(dateStr) {
  if (!dateStr) return null;
  const [,m,d] = dateStr.split('-').map(Number);
  const signs = [
    [1,20,'גדי','♑'],[2,19,'דלי','♒'],[3,20,'דגים','♓'],[4,20,'טלה','♈'],
    [5,21,'שור','♉'],[6,21,'תאומים','♊'],[7,23,'סרטן','♋'],[8,23,'אריה','♌'],
    [9,23,'בתולה','♍'],[10,23,'מאזניים','♎'],[11,22,'עקרב','♏'],[12,22,'קשת','♐'],[12,31,'גדי','♑']
  ];
  for (const [em, ed, name, sym] of signs) {
    if (m < em || (m === em && d <= ed)) return { name, sym };
  }
  return { name: 'גדי', sym: '♑' };
}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════
function render() {
  const card = document.getElementById('card');
  card.innerHTML = '';

  if (state.step < steps.length) renderStep(card);
  else if (state.step === steps.length) { renderLoading(card); generateProfile(); }
  else renderResult(card);
}

function renderStep(card) {
  const step = steps[state.step];
  const pct = Math.round((state.step / steps.length) * 100);

  // Progress
  const pw = el('div', 'prog-wrap');
  pw.innerHTML = `<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-num">${state.step}/${steps.length}</div>`;
  card.appendChild(pw);

  // Icon + title
  card.appendChild(elText('div', 'step-icon', step.icon));
  card.appendChild(elText('div', 'step-title', step.title));
  card.appendChild(elText('div', 'step-sub', step.sub));

  if (step.type === 'multi') renderMulti(card, step);
  else if (step.type === 'scale') renderScale(card, step);
  else renderFields(card, step);

  const btn = el('button', 'btn');
  btn.textContent = state.step === steps.length - 1 ? '✨ גלה את מפת הגורל שלי' : 'המשך ←';
  btn.onclick = () => { state.step++; render(); scrollTo({ top: 0, behavior: 'smooth' }); };
  card.appendChild(btn);
}

function renderMulti(card, step) {
  const sel = state.answers[step.key] || [];
  if (step.max) card.appendChild(elText('div', 'multi-hint', `✦ בחר עד ${step.max} אפשרויות`));
  else card.appendChild(elText('div', 'multi-hint', '✦ ניתן לבחור מספר תשובות'));

  const grid = el('div', `choices-grid cols${step.cols || 2}`);
  step.choices.forEach(c => {
    const btn = el('button', 'choice' + (sel.includes(c.t) ? ' selected' : ''));
    btn.innerHTML = `<span class="c-check">${sel.includes(c.t) ? '✓' : ''}</span><span class="c-emoji">${c.e}</span>${c.t}`;
    btn.onclick = () => {
      const cur = state.answers[step.key] || [];
      if (cur.includes(c.t)) {
        state.answers[step.key] = cur.filter(x => x !== c.t);
      } else {
        if (step.max && cur.length >= step.max) return;
        state.answers[step.key] = [...cur, c.t];
      }
      render();
    };
    grid.appendChild(btn);
  });
  card.appendChild(grid);
}

function renderScale(card, step) {
  const cur = state.answers[step.key];
  const wrap = el('div', 'scale-wrap');
  const labels = el('div', 'scale-labels');
  labels.innerHTML = `<span>${step.min}</span><span>${step.max}</span>`;
  wrap.appendChild(labels);
  const btns = el('div', 'scale-btns');
  for (let i = 1; i <= 10; i++) {
    const b = el('button', 'scale-btn' + (cur == i ? ' selected' : ''));
    b.textContent = i;
    b.onclick = () => { state.answers[step.key] = i; renderStep(document.getElementById('card')); };
    btns.appendChild(b);
  }
  wrap.appendChild(btns);
  card.appendChild(wrap);
}

function renderFields(card, step) {
  step.fields.forEach(f => {
    const group = el('div', 'field');
    const label = el('label', 'field-label');
    label.textContent = f.label;
    group.appendChild(label);

    let input;
    if (f.type === 'textarea') {
      input = el('textarea');
      input.placeholder = f.ph || '';
      input.rows = 4;
    } else {
      input = el('input');
      input.type = f.type;
      if (f.ph) input.placeholder = f.ph;
    }
    input.value = state.answers[f.key] || '';
    input.addEventListener('input', () => { state.answers[f.key] = input.value; });
    group.appendChild(input);
    card.appendChild(group);
  });
}

function renderLoading(card) {
  const loadSteps = [
    'מחשב מספרי גורל ונשמה...',
    'מנתח את מפת הכוכבים שלך...',
    'מזהה דפוסים ואנרגיות...',
    'בונה את תוכנית הפעולה שלך...',

  card.innerHTML = `

        <div class="m-ring m-ring-2"></div>
        <div class="m-ring m-ring-3"></div>

      <div class="load-steps">
        ${loadSteps.map((s, i) => `<div class="load-step" style="animation-delay:${i*0.6}s"><div class="dot"></div>${s}</div>`).join('')}
      </div>
    </div>
  `;
}

function renderResult(card) {
  const p = state.profile;
  card.innerHTML = '';

  const pct = 100;
  const pw = el('div', 'prog-wrap');
  pw.innerHTML = `<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-num">✓</div>`;
  card.appendChild(pw);

  // Hero
  const hero = el('div', 'result-hero');
  const zodiac = getZodiac(state.answers.birthdate);
  const lifePath = calcLifePath(state.answers.birthdate);
  hero.innerHTML = `
    <div class="result-star">🌟</div>
    <div class="result-name">${state.answers.name} — מפת הגורל שלך</div>
    <div class="result-tagline">${zodiac?.sym || ''} ${zodiac?.name || ''} • מספר גורל ${lifePath || '?'} • ניתוח אישי מלא</div>
  `;
  card.appendChild(hero);

  if (p?.affirmation) {
    const aff = el('div', 'affirmation');
    aff.innerHTML = `<div class="aff-label">✦ האישור היומי שלך ✦</div><div class="aff-text">"${p.affirmation}"</div>`;
    card.appendChild(aff);
  }

  if (p?.sections) {
    p.sections.forEach(sec => {
      const s = el('div', 'section');
      s.innerHTML = `
        <div class="sec-header">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-title">${sec.title}</span>
          <span class="sec-toggle">▼</span>
        </div>
        <div class="sec-body">${sec.content}</div>
      `;
      const toggle = s.querySelector('.sec-toggle');
      const body = s.querySelector('.sec-body');
      s.querySelector('.sec-header').onclick = () => {
        toggle.classList.toggle('open');
        body.style.display = body.style.display === 'none' ? '' : 'none';
      };
      card.appendChild(s);
    });
  }

  if (p?.steps) {
    const stepsEl = el('div', 'section');
    const ol = el('ol', 'steps-ol');
    p.steps.forEach(st => {
      const li = el('li'); li.textContent = st; ol.appendChild(li);
    });
    stepsEl.innerHTML = `<div class="sec-header"><span class="sec-icon">🗺️</span><span class="sec-title">מסלול הפעולה שלך</span></div>`;
    stepsEl.appendChild(ol);
    card.appendChild(stepsEl);
  }

  // Chat
  const chatSec = el('div', 'chat-section');
  const quickQs = ['מה הייעוד שלי?', 'מה כוחות הנסתרים שלי?', 'איך אתגבר על הפחדים?', 'מה הצעד הראשון שלי?'];
  chatSec.innerHTML = `
    <div class="chat-header">💬 שוחח עם המדריך האישי שלך</div>
    <div class="quick-qs">${quickQs.map(q => `<button class="quick-q" onclick="sendQuick('${q}')">${q}</button>`).join('')}</div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-row">
      <input type="text" id="chat-input" placeholder="שאל שאלה על הייעוד שלך..." />
      <button class="send-btn" id="send-btn">→</button>
    </div>
  `;
  card.appendChild(chatSec);

  setTimeout(() => {
    addMsg('ai', `שלום ${state.answers.name}! 🌟 עיינתי לעומק במפת הגורל שלך. יש לי תובנות מיוחדות עבורך. מה תרצה לדעת?`);
    document.getElementById('send-btn').onclick = sendChat;
    document.getElementById('chat-input').addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });
  }, 100);
}

// ══════════════════════════════════

async function generateProfile() {
  const a = state.answers;
  const lifePath = calcLifePath(a.birthdate);
  const zodiac = getZodiac(a.birthdate);
  const soulNum = calcSoulNumber(a.name);

  const prompt = `אתה מומחה עולמי בנומרולוגיה, אסטרולוגיה וקואצ'ינג טרנספורמטיבי. אתה לומד ומשתפר מכל שיחה.

פרטי המשתמש:
- שם: ${a.name}
- תאריך לידה: ${a.birthdate} | שעה: ${a.birthtime || 'לא ידוע'} | מקום: ${a.birthplace || 'לא ידוע'}
- מזל: ${zodiac?.name} ${zodiac?.sym}
- מספר גורל (חושב): ${lifePath}
- מספר נשמה: ${soulNum}
- תחושות נוכחיות: ${(a.feelings||[]).join(', ')}
- כוחות: ${(a.strengths||[]).join(', ')}
- חסמים: ${(a.obstacles||[]).join(', ')}
- ערכים: ${(a.values||[]).join(', ')}
- תשוקה: ${a.passion || 'לא צוין'}
- חלום: ${a.dream || 'לא צוין'}
- דחיפות לשינוי: ${a.urgency}/10

הנחיות:
1. חשב את מספר הגורל ומספר הנשמה בפירוט ותן פרשנות עמוקה
2. נתח את המזל האסטרולוגי בהתאם לתאריך הלידה האמיתי
3. שלב את הנומרולוגיה עם האסטרולוגיה ליצירת תמונה מלאה
4. התייחס לכוחות, לחסמים ולערכים שנבחרו
5. תן ניתוח עמוק, אישי ומדויק — לא גנרי

ענה ONLY ב-JSON תקני בלי Markdown:
{
  "affirmation": "אישור יומי עוצמתי ואישי",
  "sections": [
    {"icon":"🔢","title":"נומרולוגיה — מספרי הגורל והנשמה","content":"<p><strong>מספר גורל ${lifePath}</strong>: ...</p><p>...</p>"},
    {"icon":"⭐","title":"אסטרולוגיה — ${zodiac?.name} ${zodiac?.sym}","content":"<p>...</p>"},
    {"icon":"💎","title":"הכוחות הנסתרים שלך","content":"<p>...</p>"},
    {"icon":"🎯","title":"הייעוד האמיתי שלך","content":"<p>...</p>"},
    {"icon":"🌑","title":"הצל שלך — פריצת הדרך","content":"<p>...</p>"},
    {"icon":"💰","title":"הפוטנציאל הכלכלי שלך","content":"<p>...</p>"}
  ],
  "steps": ["צעד 1...","צעד 2...","צעד 3...","צעד 4...","צעד 5...","צעד 6..."]
}`;

  try {
    const raw = await callGemini(prompt);
    const clean = raw.replace(/```json|```/g, '').trim();
    state.profile = JSON.parse(clean);
  } catch(e) {
    state.profile = {
      affirmation: "אני מוכן לגלות את ייעודי האמיתי ולצעוד לקראתו בעוז",
      sections: [{ icon: '✨', title: 'ניתוח אישי', content: '<p>הניתוח זמין בקרוב. נסה שוב.</p>' }],
      steps: ['פנה אל עצמך בשאלות עמוקות', 'זהה דפוסים חוזרים בחייך', 'התחל בצעד קטן אחד היום']
    };
  }

  state.step = steps.length + 1;
  render();
}

// ══════════════════════════════════
// CHAT
// ══════════════════════════════════
function addMsg(role, text) {
  const msgs = document.getElementById('chat-msgs');
  if (!msgs) return;
  const d = el('div', `msg msg-${role}`);
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  state.chatHistory.push({ role: role === 'ai' ? 'model' : 'user', text });
}

window.sendQuick = function(q) {
  document.getElementById('chat-input').value = q;
  sendChat();
};

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);

  const thinking = el('div', 'msg msg-ai');
  thinking.textContent = '...';
  document.getElementById('chat-msgs').appendChild(thinking);

  // עדכון תובנות — AI לומד מהשיחה
  state.sessionInsights.push(text);

  const a = state.answers;
  const lifePath = calcLifePath(a.birthdate);
  const zodiac = getZodiac(a.birthdate);

  const context = `אתה מדריך רוחני ומקצועי, מומחה בנומרולוגיה, אסטרולוגיה וקואצ'ינג.
אתה לומד ומשתפר מכל שיחה — שים לב לדפוסים בשאלות ותתעמק בהתאם.

פרופיל: ${a.name} | ${zodiac?.name} | מספר גורל ${lifePath} | כוחות: ${(a.strengths||[]).join(', ')} | חסמים: ${(a.obstacles||[]).join(', ')}
שאלות קודמות בשיחה: ${state.sessionInsights.slice(-5).join(' | ')}

ענה בעברית, בצורה חמה, עמוקה ומדויקת. התייחס לנומרולוגיה ואסטרולוגיה כשרלוונטי.
השתמש בידע על המשתמש לתת תשובה ממוקדת ואישית.`;

  try {
    const reply = await callGemini(`השאלה: ${text}`, context);
    thinking.textContent = reply;
    state.chatHistory.push({ role: 'model', text: reply });
  } catch(e) {
    thinking.textContent = 'מצטער, אירעה שגיאה. ודא שמפתח ה-API תקין.';
  }
  document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
}

// ══════════════════════════════════
// UTILS
// ══════════════════════════════════
function el(tag, cls = '') {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function elText(tag, cls, text) {
  const e = el(tag, cls);
  e.textContent = text;
  return e;
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
render();
</script>
